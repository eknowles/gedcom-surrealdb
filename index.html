<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced GEDCOM to SurrealDB</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 2em auto; background: #0f172a; color: #f8fafc; }
        .card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        textarea { width: 100%; height: 400px; font-family: 'Fira Code', monospace; background: #000; color: #10b981; border: 1px solid #334155; margin-top: 20px; padding: 15px; font-size: 12px; }
        .btn { background: #ff00a0; color: white; padding: 10px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #d40085; }
        input[type="file"] { color: #94a3b8; }
        h1 { color: #ff00a0; margin-top: 0; }
    </style>
</head>
<body>

<div class="card">
    <h1>GEDCOM &rarr; SurrealDB</h1>
    <p>Converts nested GEDCOM records (MAP, BIRT, SOUR, etc.) into a document-graph format.</p>
    
    <input type="file" id="fileInput" accept=".ged">
    <button class="btn" onclick="processGedcom()">Generate SurrealQL</button>

    <textarea id="output" readonly placeholder="SurrealQL script will generate here..."></textarea>
</div>

<script>
function gedcomToJSON(lines) {
    const root = [];
    const stack = [{ sub: root }];

    lines.forEach(line => {
        const match = line.match(/^(\d+)\s+(@\w+@)?\s*(\w+)\s*(.*)$/);
        if (!match) return;

        const level = parseInt(match[1]);
        const xref = match[2] ? match[2].replace(/@/g, '') : null;
        const tag = match[3];
        const value = match[4].trim();

        const node = { tag, value, xref, data: {} };
        
        while (stack.length > level + 1) stack.pop();
        
        const parent = stack[stack.length - 1];
        if (!parent.sub) parent.sub = [];
        parent.sub.push(node);
        stack.push(node);
    });
    return root;
}

// Recursively builds a clean JSON object from GEDCOM sub-tags
function buildProperties(nodes) {
    let obj = {};
    if (!nodes) return obj;

    nodes.forEach(n => {
        let key = n.tag.toLowerCase();
        // Handle coordinates and nested objects
        if (n.sub && n.sub.length > 0) {
            obj[key] = buildProperties(n.sub);
            if (n.value) obj[key].val = n.value;
        } else {
            obj[key] = n.value;
        }
    });
    return obj;
}

async function processGedcom() {
    const fileInput = document.getElementById('fileInput');
    if (!fileInput.files.length) return alert("Select file");

    const text = await fileInput.files[0].text();
    const jsonTree = gedcomToJSON(text.split(/\r?\n/));
    let sql = "-- Export Generated for SurrealDB\n\n";

    jsonTree.forEach(record => {
        const props = buildProperties(record.sub);
        const id = record.xref || `gen_${Math.random().toString(36).substr(2, 9)}`;

        if (record.tag === 'INDI') {
            // Flatten Name for easier search, keep details in object
            const name = props.name?.val || props.name || "Unknown";
            sql += `CREATE person:${id} CONTENT ${JSON.stringify({
                name: name.replace(/\//g, ''),
                details: props,
                source: "gedcom_import"
            }, null, 2)};\n`;
        } 
        else if (record.tag === 'FAM') {
            sql += `CREATE family:${id} CONTENT ${JSON.stringify(props, null, 2)};\n`;
            
            // Generate Edges
            if (props.husb) sql += `RELATE person:${props.husb} -> parent_of -> family:${id};\n`;
            if (props.wife) sql += `RELATE person:${props.wife} -> parent_of -> family:${id};\n`;
            
            // Children can be multiple, handle if it's an array or single
            if (props.chil) {
                const children = Array.isArray(props.chil) ? props.chil : [props.chil];
                children.forEach(c => {
                    const cid = typeof c === 'string' ? c : c.val;
                    sql += `RELATE person:${cid.replace(/@/g,'')} -> child_of -> family:${id};\n`;
                });
            }
        }
        else if (record.tag === 'SUBM') {
            sql += `CREATE submitter:${id} CONTENT ${JSON.stringify(props, null, 2)};\n`;
        }
    });

    document.getElementById('output').value = sql;
}
</script>
</body>
</html>
